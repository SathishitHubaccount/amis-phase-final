<!DOCTYPE html>
<html>
<head>
    <title>Test Agent Negotiation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        button {
            background: #2563eb;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #1d4ed8;
        }
        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
        #result {
            margin-top: 20px;
            padding: 20px;
            background: #f3f4f6;
            border-radius: 6px;
            white-space: pre-wrap;
        }
        .loading {
            color: #2563eb;
            font-weight: bold;
        }
        .success {
            color: #16a34a;
            font-weight: bold;
        }
        .error {
            color: #dc2626;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>🤝 Agent Negotiation Test</h1>

    <p>This will test the agent negotiation system with a demand spike crisis scenario.</p>

    <button id="testBtn" onclick="runNegotiation()">Start Agent Negotiation</button>

    <div id="result"></div>

    <script>
        async function runNegotiation() {
            const resultDiv = document.getElementById('result');
            const btn = document.getElementById('testBtn');

            btn.disabled = true;
            resultDiv.className = 'loading';
            resultDiv.textContent = '⏳ Agents are negotiating... This may take 20-30 seconds...\n\nRound 1: Agents proposing solutions...\n';

            try {
                // Add progress updates
                let round = 1;
                const progressInterval = setInterval(() => {
                    if (round === 1) {
                        resultDiv.textContent += '\nRound 2: Agents critiquing each other...\n';
                        round = 2;
                    } else if (round === 2) {
                        resultDiv.textContent += '\nRound 3: Building consensus...\n';
                        round = 3;
                    }
                }, 7000);

                const response = await fetch('http://localhost:8000/api/negotiation/run', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        scenario_type: 'demand_spike',
                        product_id: 'PROD-A',
                        customer_order: 2000,
                        timeline_days: 3
                    })
                });

                clearInterval(progressInterval);

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                resultDiv.className = 'success';
                resultDiv.textContent = '✅ NEGOTIATION COMPLETE!\n\n';
                resultDiv.textContent += '='.repeat(60) + '\n';
                resultDiv.textContent += 'SCENARIO: ' + data.scenario_type + '\n';
                resultDiv.textContent += '='.repeat(60) + '\n\n';

                // Display Round 1 Proposals
                resultDiv.textContent += '📋 ROUND 1: PROPOSALS\n';
                resultDiv.textContent += '-'.repeat(60) + '\n';
                if (data.result.round_1_proposals) {
                    Object.entries(data.result.round_1_proposals).forEach(([agent, proposal]) => {
                        resultDiv.textContent += `\n${agent} Agent:\n`;
                        resultDiv.textContent += typeof proposal.proposal === 'string'
                            ? proposal.proposal.substring(0, 200) + '...\n'
                            : JSON.stringify(proposal.proposal).substring(0, 200) + '...\n';
                    });
                }

                // Display Round 2 Critiques
                resultDiv.textContent += '\n\n💬 ROUND 2: CRITIQUES\n';
                resultDiv.textContent += '-'.repeat(60) + '\n';
                if (data.result.round_2_critiques) {
                    Object.entries(data.result.round_2_critiques).forEach(([agent, critique]) => {
                        resultDiv.textContent += `\n${agent} Agent:\n`;
                        resultDiv.textContent += typeof critique.critique === 'string'
                            ? critique.critique.substring(0, 200) + '...\n'
                            : JSON.stringify(critique.critique).substring(0, 200) + '...\n';
                    });
                }

                // Display Round 3 Consensus
                resultDiv.textContent += '\n\n🎯 ROUND 3: CONSENSUS\n';
                resultDiv.textContent += '-'.repeat(60) + '\n';
                if (data.result.round_3_consensus) {
                    const consensus = data.result.round_3_consensus.final_decision;
                    resultDiv.textContent += typeof consensus === 'string'
                        ? consensus.substring(0, 500) + '...\n'
                        : JSON.stringify(consensus, null, 2).substring(0, 500) + '...\n';
                }

                resultDiv.textContent += '\n' + '='.repeat(60) + '\n';
                resultDiv.textContent += '✅ All agents participated and reached consensus!\n';
                resultDiv.textContent += '\nFull result object logged to console (F12)\n';

                console.log('Full Negotiation Result:', data);

            } catch (error) {
                resultDiv.className = 'error';
                resultDiv.textContent = '❌ ERROR: ' + error.message + '\n\n';
                resultDiv.textContent += 'Make sure:\n';
                resultDiv.textContent += '1. Backend server is running on port 8000\n';
                resultDiv.textContent += '2. Your .env file has ANTHROPIC_API_KEY set\n';
                resultDiv.textContent += '3. You have internet connection (for Claude API)\n';
                console.error('Negotiation error:', error);
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
